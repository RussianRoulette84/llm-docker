# -- artisan (local Docker DB via workspace container) --
[project.purpletech.jobs.artisan-migrate-local]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/api", "workspace", "php", "artisan", "migrate", "--force"]
timeout_s          = 120
mutates_filesystem = true
description        = "Run pending migrations against local Docker MySQL (workspace container)"

[project.purpletech.jobs.artisan-migrate-rollback-local]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/api", "workspace", "php", "artisan", "migrate:rollback", "--force"]
timeout_s          = 60
mutates_filesystem = true

[project.purpletech.jobs.artisan-migrate-status-local]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/api", "workspace", "php", "artisan", "migrate:status"]
timeout_s   = 30

# -- iOS Xcode build-log parser --
[project.purpletech.jobs.ios-buildlog]
command     = "xclogparser"
args        = ["parse", "--project", "PurpleTECH", "--reporter", "issues"]
cwd         = "src/ios"
timeout_s   = 60
description = "Parse the latest Xcode build log (errors + warnings)"

[project.purpletech.jobs.ios-clean]
command     = "xcodebuild"
args        = ["-workspace", "PurpleTECH.xcworkspace", "-scheme", "PurpleTECH", "-configuration", "Debug", "clean"]
cwd         = "src/ios"
timeout_s   = 300
description = "Clean the iOS build (DerivedData stays)"

[project.purpletech.jobs.ios-pod-install]
command            = "pod"
args               = ["install"]
cwd                = "src/ios"
timeout_s          = 600
mutates_filesystem = true

# -- compose lifecycle (overrides language pack so every compose-* job
# pins -f src/docker/docker-compose.yml; without the override, the
# language-pack defaults run against a non-existent ./compose.yaml
# at project root and fail). compose-down / compose-stop / compose-build
# are gated by mutates_filesystem because they tear down or rebuild
# container state — agents must send X-Mutation-Confirmed: yes or
# ?confirm=yes to fire them. --
[project.purpletech.jobs.compose-ps]
command   = "docker"
args      = ["compose", "-f", "src/docker/docker-compose.yml", "ps"]
timeout_s = 10

[project.purpletech.jobs.compose-up]
command   = "docker"
args      = ["compose", "-f", "src/docker/docker-compose.yml", "up", "-d"]
timeout_s = 300

[project.purpletech.jobs.compose-down]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "down"]
timeout_s          = 60
mutates_filesystem = true
description        = "Stop and REMOVE every compose service (containers + network)"

[project.purpletech.jobs.compose-stop]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "stop"]
timeout_s   = 60
description = "Stop every compose service WITHOUT removing containers (use compose-up to resume)"

[project.purpletech.jobs.compose-restart]
command = "docker"
args    = ["compose", "-f", "src/docker/docker-compose.yml", "restart", "{service}"]
[project.purpletech.jobs.compose-restart.placeholders.service]
regex   = "^[a-zA-Z0-9_-]+$"

[project.purpletech.jobs.compose-build]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "build", "{service}"]
mutates_filesystem = true
[project.purpletech.jobs.compose-build.placeholders.service]
regex   = "^[a-zA-Z0-9_-]+$"

[project.purpletech.jobs.compose-logs]
command = "docker"
args    = ["compose", "-f", "src/docker/docker-compose.yml", "logs", "--tail=200", "{service}"]
[project.purpletech.jobs.compose-logs.placeholders.service]
regex   = "^[a-zA-Z0-9_-]+$"

# compose-exec — run a pre-defined READ-ONLY diagnostic snippet inside
# the workspace container. Snippet name is regex-bounded to an explicit
# allowlist of read-only diagnostic scripts at scripts/exec-snippets/
# <name>.sh (host) → /var/www/scripts/exec-snippets/<name>.sh (workspace
# mount). Mutating operations (artisan-migrate, composer-install, …)
# have their own gated jobs and MUST NOT be added to this allowlist —
# the regex-enum is the daemon's enforcement of that boundary, not a
# convention. Service hard-coded to `workspace` (the only one the
# scripts mount targets); add a separate job if another service ever
# needs the same treatment.
[project.purpletech.jobs.compose-exec]
command   = "docker"
args      = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "workspace", "bash", "-c", "exec /var/www/scripts/exec-snippets/\"$1\".sh", "--", "{snippet}"]
timeout_s = 60
[project.purpletech.jobs.compose-exec.placeholders.snippet]
regex    = "^(verify|phpinfo|redis-ping|mysql-version|tail-errors|php-lint-changed)$"
max_len  = 40
required = true
description = "One of the six read-only diagnostic snippets"

# -- frontend npm jobs --
[project.purpletech.jobs.npm-install]
command   = "npm"
args      = ["install"]
cwd       = "src/angular"
timeout_s = 600

[project.purpletech.jobs.tsc-check]
command   = "npx"
args      = ["tsc", "--noEmit"]
cwd       = "src/angular"
timeout_s = 120

[project.purpletech.jobs.jest-filter]
command   = "npx"
args      = ["jest", "--testNamePattern", "{filter}"]
cwd       = "src/angular"
timeout_s = 300
[project.purpletech.jobs.jest-filter.placeholders.filter]
regex    = "^[A-Za-z0-9 ._-]+$"
required = true

# -- angular dev daemon (host-side) --
[project.purpletech.jobs.angular-up]
command      = "bash"
args         = ["scripts/host-snippets/angular-up.sh"]
timeout_s    = 30
command_hash = { path = "scripts/host-snippets/angular-up.sh", sha256 = "sha256:f8ca85c20f432a915bbb65c8d83abd9e5483083ed67107caba056f0134cd042a" }

[project.purpletech.jobs.angular-down]
command      = "bash"
args         = ["scripts/host-snippets/angular-down.sh"]
timeout_s    = 15
command_hash = { path = "scripts/host-snippets/angular-down.sh", sha256 = "sha256:6f2f49d3f013cbe76d107fc35e68986bbd81de338d939ad940d325bb52cf5bdd" }

[project.purpletech.jobs.angular-install]
command      = "bash"
args         = ["scripts/host-snippets/angular-install.sh"]
timeout_s    = 1800
command_hash = { path = "scripts/host-snippets/angular-install.sh", sha256 = "sha256:0721755450b6ec3806915ba59ea6f711d698916bd077e70f2c0f137b61ec0756" }

# Clean from-lockfile rebuild of the angular tree. `npm ci` deletes
# node_modules and reinstalls from package-lock.json — deterministic,
# heals a half-gutted tree (e.g. when patch-package postinstall died
# mid-reconcile under angular-install). Use when `angular-install`
# no-ops because lock-vs-tree comparison thinks nothing's needed.
[project.purpletech.jobs.angular-reinstall]
command            = "npm"
args               = ["ci", "--include=dev"]
cwd                = "src/angular"
timeout_s          = 1800
kill_after_s       = 15
mutates_filesystem = true
description        = "Clean rebuild of angular/node_modules from package-lock.json (heals half-gutted trees)"

[project.purpletech.jobs.angular-prettier-check]
command      = "bash"
args         = ["scripts/host-snippets/angular-prettier-check.sh"]
timeout_s    = 300
command_hash = { path = "scripts/host-snippets/angular-prettier-check.sh", sha256 = "sha256:b1ca671b720cb15365b993fb3067a9bb58a5a1a48fb94807a440987ad98b0e61" }

[project.purpletech.jobs.git-status-all]
command      = "bash"
args         = ["scripts/host-snippets/git-status-all.sh"]
timeout_s    = 15
command_hash = { path = "scripts/host-snippets/git-status-all.sh", sha256 = "sha256:8f89121a6f01aa4af8218eb17bb87787c8471bcf2fe1160609604e9bf4ed4157" }
description  = "git status across all 6 repos"
