cwd                = "src/website"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy the marketing site via Envoy (builds eleventy on the box, rsyncs _site)"
[project.purpletech.jobs.deploy-website.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true
[project.purpletech.jobs.deploy-website.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true

[project.purpletech.jobs.build-website]
command     = "npm"
args        = ["run", "build"]
cwd         = "src/website"
timeout_s   = 600
description = "Build the marketing site (eleventy + OG cards + minify) into website/_site"

# -- named deploy aliases (run_job-callable — the deploy verb needs
#    ?platform= which some clients can't send) --
[project.purpletech.jobs.deploy-backend]
command            = "bash"
args               = ["-c", "exec envoy run deploy --server=\"$1\" --branch=\"$2\"", "--", "{server}", "{branch}"]
cwd                = "src/php"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy the Slim backend via Envoy (src/php/ → /var/www/backend) — same target as deploy?platform=api"
[project.purpletech.jobs.deploy-backend.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true
[project.purpletech.jobs.deploy-backend.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true

[project.purpletech.jobs.deploy-frontend]
command            = "bash"
args               = ["-c", "exec envoy run deploy --server=\"$1\" --branch=\"$2\"", "--", "{server}", "{branch}"]
cwd                = "src/angular"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy the Angular app via Envoy (src/angular/ → /var/www/angular) — same target as deploy?platform=web"
[project.purpletech.jobs.deploy-frontend.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true
[project.purpletech.jobs.deploy-frontend.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true

# -- screenshots --
[project.purpletech.jobs.pt-shoot]
command      = "docker"
args         = ["exec", "{{container}}", "/root/Projects/purpletech/scripts/host-snippets/pt-shoot.sh", "{route}", "{descriptor}"]
timeout_s    = 120
kill_after_s = 10
command_hash = { path = "scripts/host-snippets/pt-shoot.sh", sha256 = "sha256:3a3e924bed97cd7c73ab3f195c981b6ea50061bffc8e81d3e126ce64f171ab92" }
description  = "Screenshot via puppeteer-core + container chromium"
[project.purpletech.jobs.pt-shoot.placeholders.route]
regex    = "^/[A-Za-z0-9/#?=&,_+%-]*$"
required = true
[project.purpletech.jobs.pt-shoot.placeholders.descriptor]
regex    = "^[A-Za-z][A-Za-z0-9_-]{0,49}$"
required = false

# -- backend tests (in-container, reach pt-mysql/pt-redis) --
[project.purpletech.jobs.phpunit-local]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/src", "workspace", "php", "vendor/phpunit/phpunit/phpunit"]
timeout_s   = 300
description = "Full backend (php/src) PHPUnit suite inside workspace container — invokes the real binary via php so a missing vendor/bin/phpunit proxy (which composer only writes on a real install, not a no-op) doesn't break us"

[project.purpletech.jobs.phpunit-local-filter]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/src", "workspace", "php", "vendor/phpunit/phpunit/phpunit", "--filter", "{test}"]
timeout_s   = 300
description = "One backend PHPUnit class or method by name, in-container (real binary path — see phpunit-local for why)"

[project.purpletech.jobs.phpunit-baseline]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/src", "workspace", "php", "vendor/phpunit/phpunit/phpunit", "--generate-baseline", "phpunit-baseline.xml"]
timeout_s          = 300
mutates_filesystem = true
description        = "Generate a PHPUnit deprecation baseline (writes php/src/phpunit-baseline.xml). Suppresses the ~75 pre-existing PHP 8.2 deprecations in legacy core files so new deprecations still fail loudly."
[project.purpletech.jobs.phpunit-local-filter.placeholders.test]
regex       = "^[A-Za-z][A-Za-z0-9_:]*$"
max_len     = 200
required    = true
description = "Test class or Class::method (alphanumerics + _:)"

[project.purpletech.jobs.composer-install-local]
command            = "docker"
args               = ["compose", "-f", "src/docker/docker-compose.yml", "exec", "-T", "-w", "/var/www/src", "workspace", "composer", "install"]
timeout_s          = 600
mutates_filesystem = true
description        = "composer install (with dev) in php/src inside the workspace container — needed for phpunit-local"

