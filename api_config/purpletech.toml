# ──────────────────────────────────────────────────────────────────────
# purpletech — project shard
# ──────────────────────────────────────────────────────────────────────
#
# Layout (Mac host):
#   ~/Projects/purpletech/
#     src/
#       api/                ← Lumen gateway (host-side php)
#       angular/            ← Angular workspace
#       ios/                ← iOS app (Xcode workspace)
#       alamofire-objc/     ← Objective-C library
#       docker/             ← compose stack (pt-mysql, pt-redis, pt-app,
#                              pt-workspace, …)
#       php/src/            ← backend tests (mount: /var/www/src inside
#                              workspace container)
#       website/            ← Eleventy marketing site
#       show/               ← (subproject)
#     scripts/              ← host-snippets / exec-snippets (NOT moved)
#     data/                 ← DB data dir (NOT moved)
#     logs/                 ← (NOT moved)

[project.purpletech]
root      = "~/Projects/purpletech"
port      = 6668
languages = ["php", "node", "compose"]


# ══════════════════════════════════════════════════════════════════════
# GENERIC VERBS — preferred entry points for agents
# ══════════════════════════════════════════════════════════════════════

# ── up ────────────────────────────────────────────────────────────────
[project.purpletech.jobs.up.platforms.web]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "up", "-d"]
timeout_s   = 300
description = "Start the compose stack (web + api + workspace + mysql + redis)"

[project.purpletech.jobs.up.platforms.api]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "up", "-d"]
timeout_s   = 300
description = "Same compose stack as `up web` — Lumen api runs in pt-app"

[project.purpletech.jobs.up.platforms.ios]
command      = "bash"
args         = ["build-and-run.sh"]
cwd          = "src/ios"
timeout_s    = 1800
kill_after_s = 15
command_hash = { path = "src/ios/build-and-run.sh", sha256 = "sha256:f23265bd8929c6845ea5af1743a34d93e38883833e9aebc9a7eb0048cb37dd62" }
description  = "Build + boot sim + install + launch the iOS app"


# ── down ──────────────────────────────────────────────────────────────
[project.purpletech.jobs.down.platforms.web]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "down"]
timeout_s   = 60
description = "Stop and REMOVE every compose service (containers + network)"

[project.purpletech.jobs.down.platforms.api]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "down"]
timeout_s   = 60
description = "Same as `down web`"


# ── restart ───────────────────────────────────────────────────────────
[project.purpletech.jobs.restart.platforms.web]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "restart"]
timeout_s   = 120
description = "Restart every compose service in place"

[project.purpletech.jobs.restart.platforms.api]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "restart"]
timeout_s   = 120
description = "Same as `restart web`"


# ── build ─────────────────────────────────────────────────────────────
[project.purpletech.jobs.build.platforms.web]
command      = "bash"
args         = ["scripts/host-snippets/angular-build.sh"]
timeout_s    = 1800
command_hash = { path = "scripts/host-snippets/angular-build.sh", sha256 = "sha256:6a73ba4002f34967470b2297c053940ad2894acc3cc54b858655d72f2b81b97b" }
description  = "Production Angular build"

[project.purpletech.jobs.build.platforms.ios]
command      = "xcodebuild"
args         = ["-workspace", "PurpleTECH.xcworkspace", "-scheme", "PurpleTECH", "-configuration", "Debug", "-destination", "generic/platform=iOS Simulator", "build"]
cwd          = "src/ios"
timeout_s    = 1800
kill_after_s = 15
description  = "Build the iOS app for the simulator (Debug)"

[project.purpletech.jobs.ios-restart]
command     = "bash"
args        = ["-c", "xcrun simctl terminate booted com.triphazard.app; exec xcrun simctl launch booted com.triphazard.app"]
cwd         = "src/ios"
timeout_s   = 30
description = "Terminate + relaunch the iOS app on the booted simulator (no rebuild)"


# ── lint ──────────────────────────────────────────────────────────────
[project.purpletech.jobs.lint.platforms.web]
command      = "bash"
args         = ["scripts/host-snippets/angular-lint.sh", "{flags}"]
timeout_s    = 600
command_hash = { path = "scripts/host-snippets/angular-lint.sh", sha256 = "sha256:ae983a9c74a02bd48325629d317104fa47d7b0649eaf60df9398ddfed2d7eab0" }
description  = "Full frontend linter"
[project.purpletech.jobs.lint.platforms.web.placeholders.flags]
regex    = "^(--(js-only|html-only|ts-only|no-ts|fast|summary-only|prettier|no-custom|no-unclosed|show-commented|no-color|debug))?$"
required = false

[project.purpletech.jobs.lint.platforms.ios]
command     = "pod"
args        = ["lib", "lint", "AlamofireObjC.podspec", "--allow-warnings"]
cwd         = "src/alamofire-objc"
timeout_s   = 900
description = "pod lib lint AlamofireObjC (proves the ObjC surface)"


# ── test ──────────────────────────────────────────────────────────────
[project.purpletech.jobs.test.platforms.web]
command     = "npm"
args        = ["test"]
cwd         = "src/angular"
timeout_s   = 300
description = "Angular test suite (jest)"

[project.purpletech.jobs.test.platforms.ios]
command     = "swift"
args        = ["test"]
cwd         = "src/alamofire-objc"
timeout_s   = 600
description = "AlamofireObjC Swift test suite"

[project.purpletech.jobs.test.platforms.api]
command      = "bash"
args         = ["-c", "cd src/api && exec vendor/bin/phpunit"]
timeout_s    = 300
command_hash = { path = "src/api/vendor/bin/phpunit", sha256 = "sha256:1fb9d47c7f192da01d06d1574b85a7e1c02b959cc03a969df1a8c0422abfc574" }
description  = "Lumen api PHPUnit (host-side, cwd=src/api)"


# ── logs ──────────────────────────────────────────────────────────────
[project.purpletech.jobs.logs.platforms.api]
command     = "tail"
args        = ["-n", "{lines}", "src/docker/logs/purpletech/purpletech.log"]
timeout_s   = 10
description = "Tail the Lumen api log"
[project.purpletech.jobs.logs.platforms.api.placeholders.lines]
regex    = "^([1-9][0-9]{0,2}|1[0-9]{3}|2000)$"
required = true

[project.purpletech.jobs.logs.platforms.web]
command      = "bash"
args         = ["scripts/host-snippets/angular-tail.sh", "{lines}"]
timeout_s    = 5
command_hash = { path = "scripts/host-snippets/angular-tail.sh", sha256 = "sha256:405f31a3a7c5ba71272385161f9acccc50722424f056a49fbf4703a196fec1b0" }
description  = "Tail logs/angular-dev.log"
[project.purpletech.jobs.logs.platforms.web.placeholders.lines]
regex    = "^([1-9][0-9]{0,2}|1[0-9]{3}|2000)$"
required = false

# logs/browser — browser console logs are ingested via POST /log and
# queryable via GET /events?type=browser_log. Not implemented here as a
# verb leaf because tailing is a different shape than running a job.


# ── status ────────────────────────────────────────────────────────────
[project.purpletech.jobs.status.platforms.web]
command      = "bash"
args         = ["scripts/host-snippets/angular-status.sh"]
timeout_s    = 5
command_hash = { path = "scripts/host-snippets/angular-status.sh", sha256 = "sha256:3e47ac70b5f205f72588465176fda4b964aebefd07554e469ab0959b61fd48fc" }
description  = "Liveness probe: pidfile alive + port 9000 listener"

[project.purpletech.jobs.status.platforms.api]
command     = "docker"
args        = ["compose", "-f", "src/docker/docker-compose.yml", "ps"]
timeout_s   = 10
description = "Compose service status"


# ── deploy ────────────────────────────────────────────────────────────
[project.purpletech.jobs.deploy.platforms.web]
# Envoy's task variables need the `--server=X --branch=Y` form (= sign),
# not space-separated, otherwise $server/$branch aren't bound inside the
# Envoy.blade.php task. Daemon's placeholder validator rejects embedded
# substrings (`--server={server}` as one arg), so we go through a bash
# -c wrapper that builds the = form internally — same pattern as
# phpunit-filter. Placeholders stay standalone elements (regex still
# applied) and the daemon sees nothing different from any other safe job.
command            = "bash"
args               = ["-c", "exec envoy run deploy --server=\"$1\" --branch=\"$2\"", "--", "{server}", "{branch}"]
cwd                = "src/angular"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy via Envoy (Laravel deployment from macOS host). Envoy.blade.php lives in src/angular/, so cwd points there."
[project.purpletech.jobs.deploy.platforms.web.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true
[project.purpletech.jobs.deploy.platforms.web.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true

[project.purpletech.jobs.deploy.platforms.api]
# Same shape as the web leaf — bash -c wrapper for Envoy's `=` form —
# but cwd points at src/php/ since the backend's Envoy.blade.php and
# release dir live there (releases at /var/www/backend/releases).
command            = "bash"
args               = ["-c", "exec envoy run deploy --server=\"$1\" --branch=\"$2\"", "--", "{server}", "{branch}"]
cwd                = "src/php"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy the backend (Slim) via Envoy. Envoy.blade.php lives in src/php/."
[project.purpletech.jobs.deploy.platforms.api.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true
[project.purpletech.jobs.deploy.platforms.api.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true

# Third deployable: the Lumen api gateway in src/api/. Doesn't fit the
# verb's two-platform shape (web/api are already taken by angular and
# the Slim backend) so it stays a named job. Same bash -c Envoy
# wrapper, cwd=src/api → /var/www/api on dev-api / live-api.
[project.purpletech.jobs.deploy-gateway]
command            = "bash"
args               = ["-c", "exec envoy run deploy --server=\"$1\" --branch=\"$2\"", "--", "{server}", "{branch}"]
cwd                = "src/api"
timeout_s          = 1800
kill_after_s       = 10
mutates_filesystem = true
description        = "Deploy the Lumen api gateway (src/api/ → /var/www/api @ dev-api / live-api)"
[project.purpletech.jobs.deploy-gateway.placeholders.server]
regex    = "^[a-z][a-z0-9_-]{0,30}$"
max_len  = 30
required = true
[project.purpletech.jobs.deploy-gateway.placeholders.branch]
regex    = "^[A-Za-z0-9._/\\-]{1,80}$"
max_len  = 80
required = true


# ══════════════════════════════════════════════════════════════════════
# NAMED JOBS — specialized cases that don't fit a single verb
# ══════════════════════════════════════════════════════════════════════

# -- website (Eleventy marketing site → /var/www/purplecollar-www) --
[project.purpletech.jobs.deploy-website]
