# Example builder-api config. Copy to your project root and edit.
# Any path you reference here must sit under this project's root, or the
# server will refuse to start.

name = "my-project"

# 127.0.0.1 only reaches the container via host.docker.internal on macOS.
# Set to 0.0.0.0 if you actually need LAN access — server will require a
# non-empty password in that case.
bind = "127.0.0.1"
port = 6666

# API password. Use env interpolation so the secret never lives in git.
# Any non-empty value gates POST/DELETE endpoints.
password = "${BUILDER_API_PASSWORD}"

# When true, GETs (logs, events, queue) also require the password.
# Auto-defaults to true on non-loopback binds; leaving it unset is fine.
# auth_reads = true

# ─── Build (legacy, single-command) ─────────────────────────────────────
# Exactly one predefined command. API invokes it via execvp (no shell), with
# an optional subset of allowed_args appended. Anything not on the whitelist
# is rejected with HTTP 400.
#
# Need `make clean && make`? Wrap it in a script:
#   ./build.sh --clean   → runs `make clean && make`
#
# For multiple distinct operations per project (e.g. test/build/lint, or
# docker compose ps/up/down), prefer `[jobs.<name>]` blocks below — they're
# the modern shape and what the bundled MCP server introspects.
[build]
command         = "./build.sh"
allowed_args    = ["--clean", "--fast", "--clear"]
timeout_s       = 900

# Same args within this many seconds collapse onto the existing queue_id
# instead of stacking duplicates. Defends against AI clients retrying on
# poll timeouts and accidentally double-running. Set to 0 to disable.
dedupe_window_s = 5

# ─── Jobs (recommended) ─────────────────────────────────────────────────
# Each `[jobs.<name>]` block is one operation your MCP / API consumer can
# invoke via POST /job/<name>. Same security model as [build]: one command
# per job, argv form (no shell), placeholders regex-validated.
#
# Placeholders MUST be standalone array elements — `args = ["--filter",
# "{test}"]` is fine, `args = ["--filter={test}"]` is rejected at config
# load. Embedded substitution would force shell-style interpolation, which
# we never do.
#
# Each placeholder has:
#   regex        — Python regex; must fullmatch the value (required)
#   max_len      — character cap on the value (default 200)
#   required     — false → omitting the param drops the corresponding argv
#                  slot; true → 400 missing_required (default true)
#   description  — surfaces in GET /jobs and into MCP tool docs
#
# Optional per-job:
#   sha256       — 64-char lowercase hex digest of the resolved command
#                  file. If set, the daemon hashes the binary at every
#                  request and refuses with 412 on mismatch. Defends
#                  against in-place tampering of your wrapper script.
#   description  — surfaces in GET /jobs / MCP tool description
#   timeout_s    — per-job kill deadline (default 60s, lower than build's
#                  default 900s because most jobs are short ops)
#
# Example: PHPUnit by class name. Your project ships `vendor/bin/phpunit`,
# the placeholder regex pins the test name to a safe identifier.
[jobs.phpunit]
command     = "vendor/bin/phpunit"
args        = ["--filter", "{test}"]
timeout_s   = 60
description = "Run a single PHPUnit class by name"
[jobs.phpunit.placeholders.test]
regex       = "^[A-Za-z][A-Za-z0-9_]*$"
max_len     = 200
required    = true
description = "PHPUnit test class name (no spaces or path separators)"

# Example: docker compose ps. No placeholders — the entire job is parameterless.
[jobs.compose-ps]
command     = "docker"
args        = ["compose", "ps"]
timeout_s   = 10
description = "List the project's compose services"

# Example: docker compose restart <service>. Placeholder limits the
# argument to a known set of service names (anchored regex).
[jobs.compose-restart]
command     = "docker"
args        = ["compose", "restart", "{service}"]
timeout_s   = 60
description = "Restart a single compose service by name"
[jobs.compose-restart.placeholders.service]
regex       = "^(workspace|php-fpm|mysql|redis|rabbitmq|nginx)$"
required    = true
description = "Compose service name (must be one of the declared services)"

# ─── Log aliases ─────────────────────────────────────────────────────────
# Each alias maps to a file path relative to project root. `/logs?file=<alias>`
# is the only way to read log files; the client cannot reach arbitrary paths.
[logs]
build = "logs/build.log"
test  = "logs/test.log"
app   = "logs/app.log"

# ─── Runtime (optional) ──────────────────────────────────────────────────
# The process `/run` launches and `/stop` kills. `/run` always restarts
# (existing process is killed with stop_signal, then freshly launched).
[runtime]
enabled        = false
start_command  = "./my-app --server"
cwd            = "."
env            = { PORT = "8080" }
stop_signal    = "SIGTERM"
stop_timeout_s = 5

# ─── Events jsonl (optional) ─────────────────────────────────────────────
# Server appends lifecycle events (build_started, runtime_exited, ...) here.
# Your build/run processes can append their own JSON lines too. Rotation is
# transparent: when the file exceeds max_bytes, the oldest ~drop_bytes are
# discarded so the newest stay readable.
[events]
path       = "logs/events.jsonl"
max_bytes  = 209715200    # 200 MB
drop_bytes = 10485760     # ~10 MB

# ─── Security tuning (optional) ──────────────────────────────────────────
[security]
auth_failures_per_min = 10
lockout_s             = 300
max_body_bytes        = 1048576   # 1 MB
max_url_bytes         = 8192      # 8 KB

# ─── Plugin (optional) ───────────────────────────────────────────────────
# Uncomment to load a Python plugin that can register custom HTTP endpoints
# and lifecycle hooks. The plugin runs unrestricted in the server's process
# — only enable this for code you wrote or fully trust.
# plugin = "builder_plugin.py"
