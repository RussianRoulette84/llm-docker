# Smallest possible builder-api config — exercises the build + logs path.
# Run the daemon from this directory:
#
#     cd builder-api/examples/hello-world
#     BUILDER_API_PASSWORD=test python3 ../../server.py
#
# Then from another shell:
#
#     curl -X POST http://127.0.0.1:6666/build \
#       -H 'X-Builder-API-Password: test' \
#       -H 'Content-Type: application/json' \
#       -d '{"args":["--fast"]}'
#     curl 'http://127.0.0.1:6666/queue'
#     curl 'http://127.0.0.1:6666/logs?file=build&n=20'

name = "hello-world"
bind = "127.0.0.1"
port = 6666
password = "${BUILDER_API_PASSWORD}"

[build]
command      = "make"
allowed_args = ["--fast", "--clean"]
timeout_s    = 60

[logs]
build = "logs/build.log"
