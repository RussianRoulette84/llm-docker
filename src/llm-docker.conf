# LLM Docker — user configuration
#
# NON-SECRET settings. API keys / passwords live in .env — this file
# is sourced AFTER llm-docker.conf at launch, so .env can override
# any value defined here.
#
# Copy this file to llm-docker.conf and tweak. The launchers (cld/ocd)
# re-read it on every invocation; no rebuild needed to change anything here.

# ============================================================================
# Mounts: DOCKER_DIR is the parent dir in the container; every bind-mount
# lands under it using the basename of the host path.
#
# Persistent mode (optional): if WORKSPACE_DIR is set, host:WORKSPACE_DIR is
# auto-mounted on every launch at DOCKER_DIR/basename(WORKSPACE_DIR).
# Example: WORKSPACE_DIR=~/Projects/ai → /root/Projects/ai
#
# Per-invocation: whenever you run cld / ocd from a host directory FOO that
# is NOT already under WORKSPACE_DIR, that folder is also mounted at
# DOCKER_DIR/FOO. Example: cd ~/work/gizmo && cld → /root/Projects/gizmo
# ============================================================================

# Host folder for the persistent "all projects" mirror. Leave empty to
# disable persistent mode — per-invocation mounts still work.
WORKSPACE_DIR=~/Projects/ai

# Parent dir in the container where mounts land.
# /root/Projects keeps container paths shaped like the host (~/Projects/foo →
# /root/Projects/foo), so CLAUDE.md's path-mapping rule holds even when the
# CWD is outside WORKSPACE_DIR.
DOCKER_DIR=/root/Projects

# ============================================
# S3C Gorilla - optional
# ============================================
# Secrets from the vault, not from the disk — a macOS toolkit that eliminates
# plaintext SSH keys and .env files by injecting secrets from an encrypted
# KeePassXC database into memory at runtime (Touch ID, or password-only on
# hardware without a Secure Enclave).
#
# When true, cld/ocd re-exec through `env-gorilla llm-docker -- …` so secrets
# come from the vault and .env becomes an optional fallback. Pairs with the
# installer toggle (step 3). Underscores only — a hyphen here is silently
# dropped by the host-side conf parser.
#
# https://github.com/RussianRoulette84/s3c-gorilla
IS_S3C_GORILLA_ENABLED=true

# ============================================
# Security Settings
# ============================================

# true = drop all Linux capabilities + no-new-privileges (hardened container).
# false = container runs with Docker's default privileges (less safe).
SANDBOX_ENABLED=false

# true = container has full internet. false = iptables blocks outbound
# internet but still allows LAN (10.x, 172.16-31.x, 192.168.x, localhost).
INTERNET_ACCESS=true


# ============================================
# SSH
# ============================================
# Enable SSH server with public key authentication
LLM_DOCKER_SSH_ENABLED=true
LLM_DOCKER_SSH_PORT=22
LLM_DOCKER_SSH_HOST_PORT=8884
# LLM_DOCKER_SSH_AUTHORIZED_KEYS=ssh-ed25519 AAAA... root@llm-docker
# Enabling SSH forces bridge networking (`docker -p` needs it).

# Or mount your authorized_keys file to /ssh/authorized_keys
# Or use Docker secret: ssh_authorized_keys

# ============================================
# TODO: TLS / HTTPS
# ============================================
# Enable HTTPS with auto-generated self-signed certificate
# LLM_DOCKER_TLS_ENABLED=true

# For custom certificates, mount them to /certs/cert.pem and /certs/key.pem
# or use Docker secrets (tls_cert, tls_key)

# ============================================
# EXTRA SOFTWARE TO INSTALL (build-time)
# ============================================
# Flags drive src/docker/install_devpack.sh at image build time. After flipping:
#   docker rmi llm-docker:latest   # then re-run cld / ocd to rebuild.
INSTALL_MEDIA=true
INSTALL_SECURITY=true
INSTALL_RUBY=true
INSTALL_CPP=true
INSTALL_LLVM_CLANG=true
INSTALL_NS=true
INSTALL_QUAKE=true
# Don't mind this flag above. I have a LLM + code editor IDE setup inside a custom made `Quake 3 Arena` on 3 monitors, hah ;)

# PHP 8.3 toolchain — CLI + mbstring/xml/curl/zip + unzip + Composer (upstream
# installer, not the stale apt one). Pulled from packages.sury.org because
# Debian bookworm only ships PHP 8.2 in main. Add ~80 MB to the image.
INSTALL_PHP=true
# Laravel Envoy on top of INSTALL_PHP — `composer global require laravel/envoy`,
# binary at /root/.config/composer/vendor/bin/envoy (wired into PATH). The
# build skips this block if INSTALL_PHP=false.
INSTALL_PHP_ENVOY=true

# Browsing stack — headless + headful Chromium for agentic browsing:
#   - chromium-headless-shell  (headless, no-systemd; HyperFrames default)
#   - chromium                 (full headful browser; needs Xvfb / X11 for UI)
# Headful chromium's post-install is gated behind a policy-rc.d shim (see
# install_devpack.sh) so dpkg doesn't choke in non-systemd containers.
# On `claude` builds the heygen-com/hyperframes Claude Code skill is also
# auto-installed via `npx skills add`. Dockerfile pins
# HYPERFRAMES_BROWSER_PATH to /usr/bin/chromium-headless-shell.
INSTALL_BROWSING=true

# Tmux session-manager helpers (all opt-in — apt tmux + helpers installed
# only when the matching flag is true). Set by the installer's Tmux step, or
# auto-flipped on first use of the matching flag (launcher triggers a rebuild).
INSTALL_TMUX_VANILLA=true
INSTALL_TMUX_TEAM=true
INSTALL_TMUX_RECON=false
INSTALL_TMUX_CODEMAN=false
INSTALL_TMUX_CLAUDE=false

# ============================================
# Container behavior
# ============================================

# Verbose host-side logging (installer + cld/ocd launchers).
#   false: docker build output goes to logs/llm-docker.log only — terminal
#          shows a spinner. Quieter first-time installs and rebuilds.
#   true:  stream [DOCKER] lines to the terminal (old behavior). Useful when
#          debugging image-build failures or watching uv / apt progress live.
# Tail logs/llm-docker.log in another terminal if you want progress without
# flipping this on.
DEBUG=false

# Environment mode (Node.js convention — honored by npm and most Node libraries):
#   development: verbose logging, debugging hints, caching disabled
#   production:  optimized, minimal logging, caching enabled
#
# In this project specifically:
#   - development flips VERBOSE=true in docker-entrypoint.sh, so Claude's
#     auth setup / API key detection prints startup messages.
#   - production keeps the boot quiet. Pick 'development' when debugging
#     container startup; otherwise leave on 'production'.
# NODE_ENV=development
NODE_ENV=production

# What happens when you exit Claude / OpenCode inside the container:
#   false: the container exits too — you land back on your host shell (default)
#   true : you drop to a bash shell INSIDE the container, so you can poke
#          around (check files, tail logs, debug). Type 'exit' there to leave
#          the container and return to host.
EXIT_TO_DOCKER=false

# Auto-update claude-code and opencode npm packages on each container start.
# Requires INTERNET_ACCESS=true. Set to false for deterministic / offline starts.
UPDATE_ON_START=true

# Max kilobytes kept in logs/llm-docker.log before rotation. When exceeded,
# the oldest ~10% of the file is dropped.
#   1024 = 1 MB (default)
#   0    = disable file logging entirely (terminal output still works)
LOG_MAX_KILOBYTES=1024

# ============================================
# Builder API (optional)
# ============================================
# Host-side daemon the container can call for build/run/logs.
# See builder-api/README.md. Only needed if you actually run the daemon.

# Hostname the CONTAINER uses to reach the host-side daemon.
# On macOS Docker Desktop, host.docker.internal routes to the host.
BUILDER_API_HOST="host.docker.internal"

# Port the daemon binds to (must match `port` in .builder-api.toml).
BUILDER_API_PORT=6666

# BUILDER_API_PASSWORD lives in .env (it's a secret).

# Auto-spawn the host-side Builder API in a new terminal window on every
# cld/ocd launch — same effect as passing `-a` every time. CLI still wins:
# `cld -a false` skips the spawn even when this is true.
BUILDER_API_AUTOSTART=false

# Gate for `plugin = "..."` in any project's .builder-api.toml. Plugins run
# unrestricted Python in the daemon process on the host — set to 1 only if
# you actually use a plugin and trust the project that declares it.
# Daemon refuses to start if a plugin is declared while this is unset.
BUILDER_API_ALLOW_PLUGINS=0

# ============================================
# Claude Code tuning
# ============================================

# Tell Claude Code it is already inside a sandbox (our Docker container).
# By default, Claude Code refuses to run as root because executing arbitrary
# model-generated commands as root on a real host is dangerous. Since Docker
# already provides isolation (capability drops, restricted mounts, no-new-privs),
# we flag the environment as sandboxed so Claude will start as root inside the
# container.
IS_SANDBOX=1

# Second sandbox signal. Bubblewrap (bwrap) is Linux's userspace sandbox,
# used by Flatpak and others; Claude Code checks for it as an additional
# "I am inside a sandbox" hint. We're not actually running bubblewrap —
# we're running Docker — but this flag satisfies the same code path and,
# together with IS_SANDBOX=1, unlocks root-inside-container execution.
CLAUDE_CODE_BUBBLEWRAP=1

# Maximum number of tokens Claude Code can return in outputs
# Default is around 25,000. Increase for longer responses.
# NOTE: for some reason you will run into limit and need this setting below
# NOTE II: update this as new models come out. LAST UPDATE: 2026.04.20
# TODO: might not be well adjusted for Opus 4.7
CLAUDE_CODE_MAX_OUTPUT_TOKENS=48000

# Optional: Limit input size for prompt/context (if supported)
#CLAUDE_CODE_MAX_INPUT_TOKENS=8192

# Disable telemetry, error reporting, and auto-updates for privacy
# Set to 1 to disable non-essential traffic
#CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1

